<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 网站--图标 -->
    <link
      rel="icon"
      href="https://images.unsplash.com/photo-1617300754527-ed58f59222b3?q=80&w=3888&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
    />
    <!-- 在线图标网站 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css"
    />
    <!-- 网站--标题 -->
    <title>IRIS STUDIO</title>

    <style>
      .loader{
        width: 100vw;
        height: 100vh;
        
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .text {
        color: black;
        font-weight: bolder;
      }

      @keyframes letter {
        0% {
          font-size: 30px;
        }

        50% {
          font-size: 40px;
        }

        100% {
          font-size: 30px;
        }
      }

      .letter {
        animation: letter 1s infinite;
      }

      .letter1 {
        animation-delay: 0s;
      }

      .letter2 {
        animation-delay: -0.9s;
      }

      .letter3 {
        animation-delay: -0.8s;
      }

      .letter4 {
        animation-delay: -0.7s;
      }

      .letter5 {
        animation-delay: -0.6s;
      }

      .letter6 {
        animation-delay: -0.5s;
      }

      .letter7 {
        animation-delay: -0.4s;
      }

      .letter8 {
        animation-delay: -0.3s;
      }

      .letter9 {
        animation-delay: -0.2s;
      }

      .letter10 {
        animation-delay: -0.1s;
      }
    </style>
  </head>
  <body>
    <!-- loading -->
    <div class="loader">
      <p class="text">
        <span class="letter letter1">L</span>
        <span class="letter letter2">o</span>
        <span class="letter letter3">a</span>
        <span class="letter letter4">d</span>
        <span class="letter letter5">i</span>
        <span class="letter letter6">n</span>
        <span class="letter letter7">g</span>
        <span class="letter letter8">.</span>
        <span class="letter letter9">.</span>
        <span class="letter letter10">.</span>
      </p>
    </div>
  </body>
  <script>
    let userAgent = navigator.userAgent.toLowerCase();
    if (
      userAgent.indexOf("android") == -1 &&
      userAgent.indexOf("iphone") == -1 &&
      userAgent.indexOf("ipad") == -1
    ) {
      location.href = "Pc.html";
    } else {
      location.href = "Mobile.html";
    }
  </script>
</html>
